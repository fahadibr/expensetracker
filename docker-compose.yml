version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: expensetrack-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: expensetrack
      POSTGRES_PASSWORD: expensetrack123
      POSTGRES_DB: expensetrack
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U expensetrack"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: expensetrack-server
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://expensetrack:expensetrack123@postgres:5432/expensetrack
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      NODE_ENV: production
      CLIENT_URL: ${CLIENT_URL:-http://localhost}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@expensetrack.app}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: expensetrack-client
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - server

  nginx:
    image: nginx:alpine
    container_name: expensetrack-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - server
      - client

volumes:
  pgdata:
