services:
  # ─── Web Service (Express + React) ───
  - type: web
    name: expensetrack
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        fromService:
          name: expensetrack
          type: web
          property: url
      - key: DATABASE_URL
        fromDatabase:
          name: expensetrack-db
          property: connectionString
      - key: SMTP_HOST
        value: ""
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: ""
      - key: SMTP_PASS
        value: ""
      - key: EMAIL_FROM
        value: noreply@expensetrack.app

  # ─── PostgreSQL Database ───
databases:
  - name: expensetrack-db
    plan: free
    databaseName: expensetrack
    user: expensetrack
